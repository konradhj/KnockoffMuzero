run:
  name: bitfall_run_007
  seed: 42
  checkpoint_dir: ./checkpoints/bitfall_run_007
  log_dir: ./logs/bitfall_run_007
  mode: train

game:
  name: bitfall
  params:
    grid_rows: 4
    grid_cols: 4
    num_receptor_segments: 1
    debris_density: 0.35
    horizon: 40
    reward_scale: 0.25

umcts:
  M_s: 80
  d_max: 6
  c_ucb: 1.25
  dirichlet_alpha: 0.3
  dirichlet_frac: 0.25
  rollout_enabled: false

nn:
  hidden_dim: 64
  representation:
    conv_channels: [16, 16]
    conv_kernel: 3
    mlp_hidden: [128]
    activation: relu
  dynamics:
    mlp_hidden: [128, 128]
    activation: relu
  prediction:
    mlp_hidden: [128]
    activation: relu
  init_scale: 1.0

training:
  # extend to confirm sustained learning
  N_e: 300
  N_es: 40
  I_t: 4
  gradient_steps_per_training: 32
  mbs: 32
  q: 2
  w: 4
  gamma: 0.97
  n_step: 6
  optimizer:
    name: adamw
    learning_rate: 0.002
    weight_decay: 0.0001
    lr_schedule: const
  loss_weights:
    lambda_pi: 1.0
    lambda_v: 0.5
    lambda_r: 1.0
  buffer_capacity: 200
  policy_target_temperature: 0.5
  q_policy_mix: 0.0
  q_policy_temperature: 0.5

logging:
  plot_every_train_cycles: 2
  checkpoint_every_episodes: 50
  log_to_jsonl: true

viz:
  pygame_enabled: false
  pygame_fps: 10
  cell_size_px: 48
  window_title: BitFall
