run:
  name: bitfall_harder
  seed: 42
  checkpoint_dir: ./checkpoints/bitfall_harder
  log_dir: ./logs/bitfall_harder
  mode: train

game:
  name: bitfall
  params:
    grid_rows: 8
    grid_cols: 8
    num_receptor_segments: 1
    receptor_length: 2      # small receptor -> 6 of 8 cols uncovered stationary
    debris_density: 0.35
    horizon: 80
    reward_scale: 0.25

# Analytical baselines on this geometry:
#   stay: 2*0.35*1 + 6*0.35*(-0.5) = -0.35 per step * 80 * 0.25 scale = -7.0
#   random: similar-to-worse (~-17)
#   optimal movement (upper bound): align receptor with two densest columns in
#     the incoming row; expected caught ~1.2, missed ~0.7 => +0.125/step = +2.5
# So learning has a meaningful gap of roughly +10 points to exploit.

umcts:
  M_s: 120
  d_max: 8
  c_ucb: 1.25
  dirichlet_alpha: 0.3
  dirichlet_frac: 0.25
  rollout_enabled: false

nn:
  hidden_dim: 96
  representation:
    conv_channels: [32, 32]
    conv_kernel: 3
    mlp_hidden: [192]
    activation: relu
  dynamics:
    mlp_hidden: [192, 192]
    activation: relu
  prediction:
    mlp_hidden: [192]
    activation: relu
  init_scale: 1.0

training:
  N_e: 500
  N_es: 80
  I_t: 4
  gradient_steps_per_training: 48
  mbs: 64
  q: 2
  w: 5
  gamma: 0.97
  n_step: 8
  optimizer:
    name: adamw
    learning_rate: 0.001
    weight_decay: 0.0001
    lr_schedule: const
  loss_weights:
    lambda_pi: 1.0
    lambda_v: 0.5
    lambda_r: 1.0
  buffer_capacity: 300
  policy_target_temperature: 0.5
  q_policy_mix: 0.0
  q_policy_temperature: 0.5

logging:
  plot_every_train_cycles: 2
  checkpoint_every_episodes: 100
  log_to_jsonl: true

viz:
  pygame_enabled: false
  pygame_fps: 10
  cell_size_px: 48
  window_title: BitFall (harder)
