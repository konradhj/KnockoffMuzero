run:
  name: cartpole_smoke
  seed: 0
  checkpoint_dir: ./checkpoints/cartpole_smoke
  log_dir: ./logs/cartpole_smoke
  mode: train

game:
  name: gym
  params:
    env_id: CartPole-v1
    max_episode_steps: 50
    reward_scale: 0.01

umcts:
  M_s: 10
  d_max: 4
  c_ucb: 1.25
  dirichlet_alpha: 0.25
  dirichlet_frac: 0.25
  rollout_enabled: false

nn:
  hidden_dim: 32
  representation:
    conv_channels: []
    conv_kernel: 1
    mlp_hidden: [64]
    activation: relu
  dynamics:
    mlp_hidden: [64]
    activation: relu
  prediction:
    mlp_hidden: [64]
    activation: relu
  init_scale: 1.0

training:
  N_e: 3
  N_es: 50
  I_t: 2
  gradient_steps_per_training: 2
  mbs: 8
  q: 1
  w: 2
  gamma: 0.99
  n_step: 4
  optimizer:
    name: adamw
    learning_rate: 0.001
    weight_decay: 0.0001
    lr_schedule: const
  loss_weights:
    lambda_pi: 1.0
    lambda_v: 0.5
    lambda_r: 1.0
  buffer_capacity: 10
  policy_target_temperature: 0.5
  q_policy_mix: 0.0
  q_policy_temperature: 0.5

logging:
  plot_every_train_cycles: 1
  checkpoint_every_episodes: 2
  log_to_jsonl: true

viz:
  pygame_enabled: false
  pygame_fps: 30
  cell_size_px: 64
  window_title: cartpole_smoke
